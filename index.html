 <!DOCTYPE html>
 <html>
 <head>

    <meta name='viewport' content='width=device-width, initial-scale=1'>

 </head>
 <body>
    <header id="title">항공기 주요 작업사항</header>
  <div class="wrap">
    <table>
      <thead>
        <tr>
          <th style="width:100px">기번</th>
          <th style="width:130px">TIME (ARR / DEP)</th>
          <th style="width:110px">SPOT</th>
          <th>작업 사항</th>

        <tr><td class="muted" colspan="5">대기 중…</td></tr>

<div class="wrap itemWrap">
  <table>
    <thead>
      <tr>
        <th colspan="8" style="text-align:center;">SOS ITEM 현황</th>

        <th style="width:120px">S/N</th>

      <tr><td class="muted" colspan="8">-</td></tr>
